name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run compile

      - run: npx @vscode/vsce package

      - name: Upload .vsix to release
        run: gh release upload ${{ github.ref_name }} *.vsix
        env:
          GH_TOKEN: ${{ github.token }}
